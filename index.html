<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raj Bittu | Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #007bff;
        }

        /* Hero Section */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 80px 0;
            gap: 50px;
        }

        .hero-content {
            flex: 1;
        }

        .greeting {
            font-size: 20px;
            color: #666;
            margin-bottom: 10px;
        }

        .hero-content h1 {
            font-size: 48px;
            color: #333;
            margin: 10px 0;
        }

        .role {
            font-size: 28px;
            color: #333;
            margin: 15px 0 20px;
        }

        .role span {
            color: #007bff;
            border-bottom: 2px solid #007bff;
        }

        .description {
            color: #666;
            line-height: 1.6;
            margin: 20px 0 30px;
            max-width: 500px;
        }

        .download-btn {
            display: inline-block;
            background: #007bff;
            color: #fff;
            padding: 12px 32px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .download-btn:hover {
            background: #0056b3;
        }

        /* Photo Section */
        .hero-photo {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .hero-photo img {
            width: 100%;
            max-width: 350px;
            height: auto;
            border-radius: 10px;
            object-fit: cover;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }

            .hero {
                flex-direction: column-reverse;
                text-align: center;
                padding: 40px 0;
            }

            .description {
                margin-left: auto;
                margin-right: auto;
            }

            .hero-content h1 {
                font-size: 36px;
            }

            .role {
                font-size: 22px;
            }

            .nav-links {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation exactly like reference -->
        <nav>
            <div class="logo">Portfolio.</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Skills</a></li>
                <li><a href="#">Portfolio</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <!-- Hero section exactly matching the reference layout -->
        <div class="hero">
            <div class="hero-content">
                <div class="greeting">Hello, It's Me</div>
                <h1>Raj Bittu</h1>
                <div class="role">And I'm a <span>Frontend Developer</span></div>
                <p class="description">
                    Graduate in Computer Science Engineering (2024). Passionate about creating beautiful, responsive web applications with modern technologies.
                </p>
                <a href="#" class="download-btn">Download CV</a>
            </div>
            <div class="hero-photo">
                <img src="bk.png" alt="Raj Bittu">
            </div>
        </div>
    </div>
</body>
</html>
